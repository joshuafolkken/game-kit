overrides:
  cookie: ^0.7.0

onlyBuiltDependencies:
  - '@joshuafolkken/kit'
  - esbuild
  - lefthook
  - unrs-resolver

# Security fixes often require same-day vite releases; minimum-release-age in .npmrc would block them.
minimumReleaseAgeExclude:
  - vite
  - '@joshuafolkken/kit'

allowBuilds:
  '@joshuafolkken/kit': true
  esbuild: true
