allowBuilds:
  '@tailwindcss/oxide': true
  esbuild: true
  lefthook: true
  sharp: true
  unrs-resolver: true
  workerd: true
  '@joshuafolkken/kit': false # project postinstall handles lefthook install

# Security fixes often require same-day vite releases; minimum-release-age in .npmrc would block them.
minimumReleaseAgeExclude:
  - vite
  - '@joshuafolkken/kit'
  - prettier-plugin-svelte@4.0.1

overrides:
  cookie: ^0.7.0
  # GHSA-58qx-3vcg-4xpx (moderate) is fixed in ws@8.20.1; force the whole tree onto the patched line.
  ws: '>=8.20.1'
  serialize-javascript: '>=7.0.5'
