extends:
  - node_modules/@joshuafolkken/app-kit/lefthook/sveltekit.yml
pre-commit:
  commands:
    template-source-parity:
      run: pnpm exec tsx scripts/templates/reconcile-templates.ts --check
pre-push:
  commands:
    test-e2e:
      glob: '{*.{svelte,ts,js,mjs,cjs},package.json}'
      env:
        CI: '1'
        PLAYWRIGHT_HTML_OPEN: never
      run: pnpm exec playwright test
