extends:
  - node_modules/@joshuafolkken/kit/lefthook/sveltekit.yml

pre-commit:
  commands:
    # Guard the copy/tripwire pairs declared in scripts/templates/template-source-logic.ts.
    # No glob: --check is fast and self-scoping (it derives its own file set from
    # the pair lists), so running it unconditionally avoids a hand-listed glob
    # that would silently drift out of sync with COPY_PAIRS / TRIPWIRE_PAIRS.
    template-source-parity:
      run: pnpm exec tsx scripts/templates/reconcile-templates.ts --check

pre-push:
  commands:
    test-e2e:
      glob: '{*.{svelte,ts,js,mjs,cjs},package.json}'
      env:
        CI: '1'
        PLAYWRIGHT_HTML_OPEN: never
      run: pnpm exec playwright test
