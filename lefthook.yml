extends:
  - node_modules/@joshuafolkken/kit/lefthook/sveltekit.yml

pre-commit:
  commands:
    # Guard the copy/tripwire pairs declared in scripts/template-source-logic.ts.
    template-source-parity:
      glob: '{.npmrc,vite.config.ts,src/routes/layout.css,src/lib/game/Score.svelte.ts,templates/npmrc,templates/vite.config.ts,templates/src/routes/layout.css,templates/src/lib/game/Score.svelte.ts,.template-source-manifest.json}'
      run: pnpm exec tsx scripts/reconcile-templates.ts --check

pre-push:
  commands:
    test-e2e:
      glob: '{*.{svelte,ts,js,mjs,cjs},package.json}'
      env:
        CI: '1'
        PLAYWRIGHT_HTML_OPEN: never
      run: pnpm exec playwright test
