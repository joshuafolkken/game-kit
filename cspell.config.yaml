version: "0.2"
# game-common words + the credits.ts ignore are single-sourced in cspell/game.yaml (also
# distributed to scaffolded projects via `@joshuafolkken/game-kit/cspell/game`). It chains
# `@joshuafolkken/kit/cspell/sveltekit`, so only repo-specific words/ignorePaths live here.
import:
  - "./cspell/game.yaml"
ignorePaths:
  - "**/credits-config.ts"
  - "**/game/credits.test.ts"
words:
  - Baer
  - bilinearly
  - mnemecha
  - packument
  - Boisclair
  - dotless
  - GHSA
  - Inerney
  - MCGA
  - moiré
  - mrdoob
  - MSAA
  - multicriteria
  - mygame
  - NTSC
  - Pixabay
  - Raycaster
  - raycaster
  - constructibility
  - inferrable
  - retuned
  - scaffolder
  - GLSL
  - glsl
  - scanline
  - scanlines
  - SNES
  - tonemap
  - spacebar
  - texels
  - Upscales
  - upscales
  - neighbour
  - neighbours
  - colour
  - unstub
  - viewports
  - vsize
  - WASD
  - winget
